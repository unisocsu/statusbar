plugins {
    id 'com.android.application'
}

android {
    namespace 'com.neo.keymonitor'
    compileSdk 19

    defaultConfig {
        applicationId "com.neo.keymonitor"
        minSdk 19
        targetSdk 19
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_7
        targetCompatibility JavaVersion.VERSION_1_7
    }
}

dependencies {
    // באנדרואיד 4.4 אנחנו לא צריכים את ספריות התמיכה המודרניות והכבדות
}
